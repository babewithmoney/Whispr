services:
  - type: web
    name: whispr
    env: ruby
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: whispr_production
          property: connectionString
      - key: RAILS_ENV
        value: production

databases:
  - name: whispr_production
    databaseName: whispr_production
    ipAllowList: [] 